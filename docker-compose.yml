services:
  web:
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - db_data:/app/database
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: localhost", "http://127.0.0.1:8000/accounts/login/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  db_data:
